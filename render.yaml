services:
  - type: web
    name: availability-api
    env: docker
    rootDir: server
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: availability-db
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"

databases:
  - name: availability-db
    plan: free